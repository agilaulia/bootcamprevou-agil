<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="To-Do List Life Dashboard - A personal productivity dashboard with time display, Pomodoro timer, task management, and quick links">
    <meta name="theme-color" content="#ffffff">
    <title>To-Do Life Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="dashboard">
        <!-- Time and Date Display -->
        <header class="time-section">
            <div class="time-display" id="timeDisplay">12:00:00 AM</div>
            <div class="date-display" id="dateDisplay">Monday, January 1</div>
        </header>

        <!-- Greeting Module -->
        <section class="greeting-section">
            <h1 class="greeting" id="greeting">Good Morning</h1>
        </section>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Focus Timer Module -->
            <section class="timer-section">
                <h2 class="section-title">Focus Timer</h2>
                <div class="timer-display" id="timerDisplay">25:00</div>
                <div class="timer-controls">
                    <button class="btn btn-primary" id="timerStart" aria-label="Start timer">Start</button>
                    <button class="btn btn-secondary" id="timerStop" aria-label="Stop timer">Stop</button>
                    <button class="btn btn-secondary" id="timerReset" aria-label="Reset timer">Reset</button>
                </div>
            </section>

            <!-- Task Manager Module -->
            <section class="task-section">
                <h2 class="section-title">Tasks</h2>
                <div class="task-input-container">
                    <input 
                        type="text" 
                        id="taskInput" 
                        class="input-field" 
                        placeholder="Add a new task..."
                        maxlength="500"
                        aria-label="New task input"
                    >
                    <button class="btn btn-primary" id="taskAddBtn" aria-label="Add task">Add</button>
                </div>
                <ul class="task-list" id="taskList" aria-live="polite"></ul>
            </section>
        </main>

        <!-- Quick Links Module -->
        <section class="links-section">
            <h2 class="section-title">Quick Links</h2>
            <div class="links-input-container">
                <input 
                    type="text" 
                    id="linkName" 
                    class="input-field" 
                    placeholder="Link name"
                    maxlength="50"
                    aria-label="Link name input"
                >
                <input 
                    type="text" 
                    id="linkUrl" 
                    class="input-field" 
                    placeholder="URL"
                    maxlength="2000"
                    aria-label="Link URL input"
                >
                <button class="btn btn-primary" id="linkAddBtn" aria-label="Add link">Add Link</button>
            </div>
            <div class="links-list" id="linksList"></div>
        </section>

        <!-- Settings Panel & Theme Switcher -->
        <aside class="settings-section">
            <h2 class="section-title">Settings</h2>
            <div class="settings-group">
                <label for="userNameInput">Your Name:</label>
                <input 
                    type="text" 
                    id="userNameInput" 
                    class="input-field" 
                    placeholder="Enter your name"
                    maxlength="50"
                    aria-label="User name input"
                >
            </div>
            <div class="settings-group">
                <label for="timerDurationInput">Timer Duration (minutes):</label>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <input 
                        type="number" 
                        id="timerDurationInput" 
                        class="input-field" 
                        placeholder="25"
                        min="1"
                        max="120"
                        aria-label="Timer duration input"
                        style="flex: 1;"
                    >
                    <button class="btn btn-primary" id="setTimerBtn" aria-label="Set to timer">Set</button>
                </div>
            </div>
            <div class="settings-group">
                <label for="themeToggle">Theme:</label>
                <div class="theme-toggle-wrapper">
                    <button type="button" id="themeToggle" class="theme-toggle-btn" aria-label="Toggle theme" aria-live="polite">
                        <span class="toggle-thumb">
                            <!-- Moon Icon (for Light Mode) -->
                            <svg class="icon icon-moon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                            </svg>
                            <!-- Sun Icon (for Dark Mode) -->
                            <svg class="icon icon-sun" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="5"></circle>
                                <line x1="12" y1="1" x2="12" y2="3"></line>
                                <line x1="12" y1="21" x2="12" y2="23"></line>
                                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                                <line x1="1" y1="12" x2="3" y2="12"></line>
                                <line x1="21" y1="12" x2="23" y2="12"></line>
                                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                            </svg>
                        </span>
                    </button>
                    <span class="theme-label-text" id="themeLabelText">Light Mode</span>
                </div>
            </div>
        </aside>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
